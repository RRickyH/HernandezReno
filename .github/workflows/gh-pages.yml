name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./restile
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1
        with:
          ref: 'develop'
    
      - name: Setup node environment
        uses: actions/setup-node@v6.1.0
        with:
          cache: 'npm'
          cache-dependency-path: './restile/package-lock.json'
  
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4.0.0
        with:
          path: './restile/dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4.0.5
